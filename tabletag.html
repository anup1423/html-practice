<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Table tag</title>
    </head>
    <body>
        <table border="1">
            <caption>student information</caption>
        <tr>
            <th>name</th>
            <th>CGPA</th>
            <th>Attenedance</th>
        </tr>
        <tr>
            <td>Anup</td>
            <td>8</td>
            <td>80</td>
        </tr>
        <tr>
            <td>Vicky</td>
            <td>9</td>
            <td>90</td>
        </tr>
        <tr>
            <td colspan="2">This cell spans two colomns</td>
            
        </tr>
        </table>
    </body>
</html>
